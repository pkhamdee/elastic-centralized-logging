# Logstash pipeline: parse Kubernetes ingress-nginx access logs into a data stream.
# Inputs:
#   beats (5044) -> real traffic from the Filebeat DaemonSet
#   http  (8080) -> local testing (test/parse-ingress-test.sh posts a sample line here)
# Output: the logs-nginx.ingress-default data stream (LogsDB + ILM apply via the index template).

input {
  beats { port => 5044 }
  http  { port => 8080 }
}

filter {
  # ingress-nginx configured for JSON logs (recommended): parse straight away.
  if [message] =~ /^\s*\{/ {
    json { source => "message" }
  }
  # Fallback: default text access-log format -> grok it.
  else {
    grok {
      match => { "message" =>
        '%{IPORHOST:remote_addr} - %{DATA:user} \[%{HTTPDATE:ts}\] "%{WORD:method} %{DATA:path} HTTP/%{NUMBER:httpver}" %{NUMBER:status} %{NUMBER:bytes} "%{DATA:referer}" "%{DATA:agent}" %{NUMBER:req_len} %{NUMBER:request_time} \[%{DATA:upstream}\] %{DATA:upstream_addr} %{DATA:upstream_len} %{DATA:upstream_time} %{DATA:upstream_status} %{DATA:req_id}' }
    }
    date { match => [ "ts", "dd/MMM/yyyy:HH:mm:ss Z" ] }
  }

  # Normalize field types so Kibana aggregations work.
  mutate {
    convert => { "status" => "integer" "bytes" => "integer" "request_time" => "float" }
    remove_field => [ "@version", "ecs", "agent", "tags", "input", "event", "headers", "host" ]
  }
}

output {
  elasticsearch {
    hosts    => ["https://es01:9200"]
    user     => "elastic"
    password => "${ELASTIC_PASSWORD}"
    ssl_enabled                 => true
    ssl_certificate_authorities => ["/usr/share/logstash/config/certs/ca/ca.crt"]

    # Write to a data stream so LogsDB + ILM apply automatically.
    data_stream           => "true"
    data_stream_type      => "logs"
    data_stream_dataset   => "nginx.ingress"
    data_stream_namespace => "default"
  }
}
