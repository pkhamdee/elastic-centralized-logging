# Logstash pipeline for Kong's http-log plugin output (see the Kong API gateway project).
# Kong POSTs newline-delimited JSON, one object per request, so use the json_lines codec.
# Runs as its own pipeline (see logstash/config/pipelines.yml) on port 8081 to stay isolated
# from the ingress pipeline.

input {
  http {
    port  => 8081
    codec => json_lines
  }
}

filter {
  # Kong's started_at is epoch milliseconds.
  if [started_at] {
    date { match => ["started_at", "UNIX_MS"] target => "@timestamp" }
  }

  # Flatten the most useful fields for querying in Kibana.
  mutate {
    add_field => {
      "[kong][service]"        => "%{[service][name]}"
      "[kong][route]"          => "%{[route][name]}"
      "[kong][consumer]"       => "%{[consumer][username]}"
      "[http][method]"         => "%{[request][method]}"
      "[http][uri]"            => "%{[request][uri]}"
      "[http][status]"         => "%{[response][status]}"
      "[kong][latency_total]"  => "%{[latencies][request]}"
      "[kong][latency_kong]"   => "%{[latencies][kong]}"
      "[kong][latency_proxy]"  => "%{[latencies][proxy]}"
    }
  }
  mutate {
    convert => { "[http][status]" => "integer" "[kong][latency_total]" => "integer" }
    remove_field => ["headers", "@version"]
  }
}

output {
  elasticsearch {
    hosts    => ["https://es01:9200"]
    user     => "elastic"
    password => "${ELASTIC_PASSWORD}"
    ssl_enabled                 => true
    ssl_certificate_authorities => ["/usr/share/logstash/config/certs/ca/ca.crt"]

    data_stream           => "true"
    data_stream_type      => "logs"
    data_stream_dataset   => "kong.proxy"
    data_stream_namespace => "default"
  }
}
